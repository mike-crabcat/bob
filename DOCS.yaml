- path: ./docs/outreach.md
  prompt: |
          This document must describe the outreach process.  It should include any high level ascii architecture diagrams to aid a coherent
          description suitable for a software developer to understand the system and how it works. It should also start with the purpose and intent of the feature.
- path: ./docs/memory.md
  prompt: |
          This document must describe the memory system. It should start with the purpose and intent of the feature:
          why persistent memory exists, what problem it solves, and the core design tradeoffs (e.g. claim-centric
          storage vs. free-text documents, extraction-on-write vs. retrieval-time reasoning).
          It must cover the following topics at an architectural level. Specific table names, tool names, file paths,
          and CLI subcommands should be discovered from the codebase at write time rather than asserted from memory,
          so the doc stays correct as the implementation evolves.
          - The data model: the pipeline from raw session messages to bulletins to atomic claims to rendered entity
            views. Explain what each stage holds and why the separation exists.
          - Authoring paths: how facts enter memory both during a live conversation (agent-driven writes) and after
            a session goes idle (background bulletin generation from session transcripts). Cover how prior-context
            windows and synthetic-echo flagging prevent the extraction pipeline from re-ingesting recalled facts.
          - The curation pipeline: how raw bulletins become clean entity state — extraction, supplemental gap-filling,
            and reconciliation. Explain what each stage is responsible for and how it interacts with the LLM.
          - Retrieval: how the agent accesses memory at runtime — semantic search, ID lookup, graph traversal — and
            how retrieval results are injected back into the conversation.
          - Visibility and scope: how the same fact can be private to a contact, scoped to a group, or public, and
            how that boundary is enforced.
          - Operability: how an operator inspects, repairs, and reprocesses memory (CLI tooling, dashboard pages,
            per-entity model overrides) without a full rebuild.
          - Integration points: where memory plugs into prompt assembly and LLM dispatch.
          Include high-level ASCII architecture diagrams showing (at minimum) the bulletin→claim→entity pipeline and
          the prompt-assembly / LLM-dispatch integration. Diagrams should make the data flow obvious to a reader
          skimming the doc.
          Aim for quality technical documentation: precise nouns for concepts, consistent terminology throughout,
          concrete examples where they help, and prose that flows between sections rather than reading as a checklist.
          Suitable for a software engineer to understand the system end-to-end and confidently modify it.
- path: ./docs/skills.md
  prompt: |
          This document must describe how skills work in Bob. It should start with the purpose and intent of the feature.
          It must cover:
          - The file requirements: each skill is a directory under the workspace skills/ directory, containing either a
            skill.md or SKILL.md file (both are accepted). Optional files: helper Python scripts (run via run_script tool),
            pyproject.toml for dependency management, README.md for documentation.
          - The frontmatter format in skill.md: YAML-like key:value pairs between --- delimiters. Supported keys are
            "name" (skill identifier), "description" (one-line summary shown in index), and "trigger" (natural language
            description of when the LLM should activate this skill).
          - The body of skill.md: markdown instructions that are loaded on-demand when the LLM calls the use_skill tool.
            These instructions tell the LLM how to execute the skill, including what scripts to run and how to use the results.
          - How skills are discovered: skill_loader.py scans the skills/ directory, builds an mtime-based cache, and generates
            a lightweight index (name + description + trigger) that is injected into every LLM system prompt via prompt_assembler.
          - How skills are activated: the LLM reads the trigger from the system prompt index, then calls the use_skill tool
            to load the full instructions. If the skill has Python scripts, the LLM calls run_script which executes via
            `uv run` with a sandboxed environment (skill_env.py maps BOB_ prefixed secrets to standard env vars).
          - The caching mechanism: module-level caches keyed by mtime hash detect file changes automatically — no server
            restart required to add or modify skills.
          - The dashboard integration: the /api/skills/installed endpoint lists all skills for the UI.
          Include high level ascii architecture diagrams showing the skill discovery, index injection, and on-demand loading flow.
          Suitable for a software engineer to understand the system end-to-end.
- path: ./docs/datamodel.md
  prompt: |
          This document is the canonical reference for Bob's SQLite schema. It should start with a one-paragraph purpose
          statement: that the schema is the persistent backbone of the system (every channel — WhatsApp, email, voice,
          phone — writes here), that migrations live under packages/bob-server/bob_server/schemas/ as numbered .sql files
          applied in order at startup via Database.apply_migrations(), and that the document is grouped by domain so a
          reader can find the tables they care about without scanning a 500-line CREATE TABLE dump.
          The body must cover, grouped by domain (sessions & messaging, dispatches, phone calls, email, calendars & events,
          contacts, memory, notifications, webhooks, skills, audit/utility):
          - A per-domain entity-relationship diagram. Use Mermaid `erDiagram` blocks so they render on GitHub and in any
            Markdown viewer that supports Mermaid. Show the tables in that domain, their columns (at least PK, FK, and
            the load-bearing uniqueness/scoping columns — skip incidental metadata like created_at/updated_at unless they
            drive behavior), and the relationships between them (one-to-many, many-to-many, self-reference).
          - A "Purpose" subsection per table: one or two sentences on what the table is for and why it exists, in terms of
            the feature it backs. Frame it as "X is the source of truth for Y" or "X records Y so that Z can happen" — not
            as a column-by-column description.
          - Where useful, a "Lifecycle" or "How it gets written" note explaining when rows are inserted, who owns the
            writes (a service, a background task, a CLI subcommand), and any retention/cleanup trigger that prunes them.
          Conventions to call out once near the top:
          - Session keys: their format (channel:scope:peer identifiers, e.g. agent:main:whatsapp:dm:+61400111222) and the
            role they play as the join key across session_messages, dispatches, session_agendas, session_participants,
            session_summaries, and elsewhere.
          - JSON metadata columns: where they appear, what they typically carry, and the convention of co-locating
            channel-specific data instead of adding new top-level columns.
          - Soft delete vs hard delete: which tables use which, and why.
          Specific table names, column names, FK relationships, and migration file numbers should be discovered from the
          codebase (schemas/*.sql and services/*.py) at write time rather than asserted from memory, so the doc stays
          correct as the schema evolves. Do not list every column of every table — list the columns that matter for
          understanding relationships and behavior.
          Aim for a document a software engineer can skim to find "where does X live" and "what relates to Y", with
          enough diagram detail to navigate without opening the migration files.
