[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "cyborg-cli"
version = "0.1.0"
description = "CLI for Cyborg data service"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "OpenClaw" },
]
dependencies = [
  "cyborg-core==0.1.0",
  "typer>=0.16.0",
  "uvicorn>=0.35.0",
]

[project.optional-dependencies]
server = ["cyborg-server==0.1.0"]

[project.scripts]
cyborg = "cyborg_cli.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["cyborg_cli"]
